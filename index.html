        // Background (Particle Force Field)
        const Background = () => {
            const canvasRef = useRef(null);
            const mouseRef = useRef({ x: 0, y: 0, isDown: false });

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                let animationFrameId;
                let particles = [];

                const PARTICLE_COUNT = 900;
                const INTERACTION_RADIUS = 300;
                const MOUSE_FORCE = 2.0;

                const COLORS = ['#FFD700', '#FDB931', '#6c5ce7', '#ffffff'];

                // First 500 digits of π (no decimal point — pure digits for flow)
                const PI_DIGITS = "314159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196442881097566593344612847564823378678316527120190914564856692346034861045432664821339360726024914127372458700660631558817488152092096282925409171536436";

                class Particle {
                    constructor(w, h) {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = (Math.random() - 0.5) * 2;
                        this.ax = 0;
                        this.ay = 0;
                        this.age = 0;
                        this.lifespan = Math.random() * 200 + 100;
                        this.baseColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                        this.size = Math.random() * 8 + 8; // font size in px (8–16)
                        this.digit = PI_DIGITS[Math.floor(Math.random() * PI_DIGITS.length)];
                        this.rotation = (Math.random() - 0.5) * 0.4;
                        this.friction = 0.96;
                    }

                    update(w, h, chaos, time, mouse) {
                        this.age++;
                        const scale = 0.005;
                        const angle = (Math.cos(this.x * scale) + Math.sin(this.y * scale)) * chaos;
                        const noise = Math.sin(time * 0.001 + this.x * 0.002) * 0.5;
                        const theta = angle + noise;

                        this.ax = Math.cos(theta) * 0.1;
                        this.ay = Math.sin(theta) * 0.1;

                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < INTERACTION_RADIUS) {
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            const forceMagnitude = (1 - distance / INTERACTION_RADIUS) * MOUSE_FORCE;

                            if (mouse.isDown) {
                                this.ax += forceDirectionX * forceMagnitude * 2;
                                this.ay += forceDirectionY * forceMagnitude * 2;
                            } else {
                                this.ax -= forceDirectionX * forceMagnitude;
                                this.ay -= forceDirectionY * forceMagnitude;
                            }
                        }

                        this.vx += this.ax;
                        this.vy += this.ay;
                        this.vx *= this.friction;
                        this.vy *= this.friction;
                        this.x += this.vx;
                        this.y += this.vy;

                        if (this.x < 0) this.x = w;
                        if (this.x > w) this.x = 0;
                        if (this.y < 0) this.y = h;
                        if (this.y > h) this.y = 0;

                        if (this.age > this.lifespan) {
                            this.reset(w, h);
                        }
                    }

                    reset(w, h) {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.vx = 0;
                        this.vy = 0;
                        this.age = 0;
                        this.lifespan = Math.random() * 200 + 50;
                        this.digit = PI_DIGITS[Math.floor(Math.random() * PI_DIGITS.length)];
                    }

                    draw(ctx) {
                        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                        let color;
                        if (speed > 3) {
                            color = '#ffffff';
                        } else if (speed > 1.5) {
                            color = '#a55eea';
                        } else {
                            color = this.baseColor;
                        }
                        // Fade in/out based on age
                        const lifeRatio = this.age / this.lifespan;
                        let alpha = 1;
                        if (lifeRatio < 0.1) alpha = lifeRatio * 10;
                        else if (lifeRatio > 0.8) alpha = (1 - lifeRatio) * 5;

                        ctx.globalAlpha = Math.max(0, Math.min(1, alpha * 0.85));
                        ctx.fillStyle = color;
                        ctx.font = `bold ${this.size}px 'JetBrains Mono', monospace`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(this.digit, this.x, this.y);
                        ctx.globalAlpha = 1;
                    }
                }

                const handleMouseMove = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    mouseRef.current.x = e.clientX - rect.left;
                    mouseRef.current.y = e.clientY - rect.top;
                };

                const handleMouseDown = () => { mouseRef.current.isDown = true; };
                const handleMouseUp = () => { mouseRef.current.isDown = false; };

                const init = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    particles = [];
                    for(let i=0; i<PARTICLE_COUNT; i++) {
                        particles.push(new Particle(canvas.width, canvas.height));
                    }
                };

                let currentChaos = 2;

                const animate = (time) => {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = 'rgba(5, 5, 7, 0.18)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.globalCompositeOperation = 'lighter';
                    const chaos = currentChaos + Math.sin(time * 0.0005) * 0.5;

                    particles.forEach(p => {
                        p.update(canvas.width, canvas.height, chaos, time, mouseRef.current);
                        p.draw(ctx);
                    });

                    animationFrameId = requestAnimationFrame(() => animate(performance.now()));
                };

                window.addEventListener('resize', init);
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mousedown', handleMouseDown);
                window.addEventListener('mouseup', handleMouseUp);

                init();
                animate(0);

                return () => {
                    window.removeEventListener('resize', init);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mousedown', handleMouseDown);
                    window.removeEventListener('mouseup', handleMouseUp);
                    cancelAnimationFrame(animationFrameId);
                };

            }, []);

            return (
                <div className="fixed inset-0 z-0 bg-[#050507]">
                    <canvas ref={canvasRef} className="w-full h-full cursor-crosshair" />
                </div>
            );
        };
