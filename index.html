        // 1. Background (Particle Force Field)
        const Background = () => {
            const canvasRef = useRef(null);
            const mouseRef = useRef({ x: 0, y: 0, isDown: false });

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                let animationFrameId;
                let particles = [];
                
                const PARTICLE_COUNT = 2500;
                const INTERACTION_RADIUS = 300;
                const MOUSE_FORCE = 2.0;
                
                const COLORS = ['#FFD700', '#FDB931', '#6c5ce7', '#ffffff'];

                class Particle {
                    constructor(w, h) {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = (Math.random() - 0.5) * 2;
                        this.ax = 0;
                        this.ay = 0;
                        this.age = 0;
                        this.lifespan = Math.random() * 200 + 100;
                        this.baseColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                        this.size = Math.random() * 1.5 + 0.5;
                        this.friction = 0.96;
                    }

                    update(w, h, chaos, time, mouse) {
                        this.age++;
                        const scale = 0.005;
                        const angle = (Math.cos(this.x * scale) + Math.sin(this.y * scale)) * chaos;
                        const noise = Math.sin(time * 0.001 + this.x * 0.002) * 0.5;
                        const theta = angle + noise;
                        
                        this.ax = Math.cos(theta) * 0.1;
                        this.ay = Math.sin(theta) * 0.1;

                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < INTERACTION_RADIUS) {
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            const forceMagnitude = (1 - distance / INTERACTION_RADIUS) * MOUSE_FORCE;

                            if (mouse.isDown) {
                                this.ax += forceDirectionX * forceMagnitude * 2;
                                this.ay += forceDirectionY * forceMagnitude * 2;
                            } else {
                                this.ax -= forceDirectionX * forceMagnitude;
                                this.ay -= forceDirectionY * forceMagnitude;
                            }
                        }

                        this.vx += this.ax;
                        this.vy += this.ay;
                        this.vx *= this.friction;
                        this.vy *= this.friction;
                        this.x += this.vx;
                        this.y += this.vy;

                        if (this.x < 0) this.x = w;
                        if (this.x > w) this.x = 0;
                        if (this.y < 0) this.y = h;
                        if (this.y > h) this.y = 0;
                        
                        if (this.age > this.lifespan) {
                            this.reset(w, h);
                        }
                    }

                    reset(w, h) {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.vx = 0; 
                        this.vy = 0;
                        this.age = 0;
                        this.lifespan = Math.random() * 200 + 50;
                    }

                    draw(ctx) {
                        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                        if (speed > 3) {
                            ctx.fillStyle = '#ffffff';
                        } else if (speed > 1.5) {
                            ctx.fillStyle = '#a55eea';
                        } else {
                            ctx.fillStyle = this.baseColor;
                        }
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const handleMouseMove = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    mouseRef.current.x = e.clientX - rect.left;
                    mouseRef.current.y = e.clientY - rect.top;
                };

                const handleMouseDown = () => { mouseRef.current.isDown = true; };
                const handleMouseUp = () => { mouseRef.current.isDown = false; };

                const init = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    particles = [];
                    for(let i=0; i<PARTICLE_COUNT; i++) {
                        particles.push(new Particle(canvas.width, canvas.height));
                    }
                };

                let currentChaos = 2;

                const animate = (time) => {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = 'rgba(5, 5, 7, 0.1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.globalCompositeOperation = 'lighter';
                    const chaos = currentChaos + Math.sin(time * 0.0005) * 0.5;

                    particles.forEach(p => {
                        p.update(canvas.width, canvas.height, chaos, time, mouseRef.current);
                        p.draw(ctx);
                    });

                    animationFrameId = requestAnimationFrame(() => animate(performance.now()));
                };

                window.addEventListener('resize', init);
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mousedown', handleMouseDown);
                window.addEventListener('mouseup', handleMouseUp);
                
                init();
                animate(0);

                return () => {
                    window.removeEventListener('resize', init);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mousedown', handleMouseDown);
                    window.removeEventListener('mouseup', handleMouseUp);
                    cancelAnimationFrame(animationFrameId);
                };

            }, []);

            return (
                <div className="fixed inset-0 z-0 bg-[#050507]">
                    <canvas ref={canvasRef} className="w-full h-full cursor-crosshair" />
                </div>
            );
        };

        // 3. Tilt Card & Stats
        const TiltCard = ({ children, className = "" }) => {
            const cardRef = useRef(null);
            const [rotation, setRotation] = useState({ x: 0, y: 0 });
            const [opacity, setOpacity] = useState(0);
            const [position, setPosition] = useState({ x: 0, y: 0 });

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -10; 
                const rotateY = ((x - centerX) / centerX) * 10;
                setRotation({ x: rotateX, y: rotateY });
                setPosition({ x, y });
                setOpacity(1);
            };

            const handleMouseLeave = () => {
                setRotation({ x: 0, y: 0 });
                setOpacity(0);
            };

            return (
                <div ref={cardRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} className={`relative rounded-xl border border-white/10 bg-[#0f0f13]/80 backdrop-blur-sm p-6 transition-all duration-200 ease-out ${className}`} style={{ transform: `perspective(1000px) rotateX(${rotation.x}deg) rotateY(${rotation.y}deg) scale3d(1, 1, 1)`, willChange: 'transform' }}>
                    <div className="pointer-events-none absolute -inset-px rounded-xl opacity-0 transition-opacity duration-300 z-0" style={{ opacity, background: `radial-gradient(600px circle at ${position.x}px ${position.y}px, rgba(108, 92, 231, 0.15), transparent 40%)` }} />
                    <div className="relative z-10 h-full flex flex-col">

                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -12; 
                    const rotateY = ((x - centerX) / centerX) * 12;
                    setRotation({ x: rotateX, y: rotateY });
                    setPosition({ x, y });
                    setOpacity(1);
